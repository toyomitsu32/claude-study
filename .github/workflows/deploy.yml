name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build for GitHub Pages
        run: GITHUB_PAGES=true pnpm build
        env:
          GITHUB_PAGES: 'true'

      - name: Remove Manus debug scripts and create 404.html
        run: |
          python3 -c "
          import re
          with open('dist/public/index.html', 'r') as f:
              content = f.read()
          # Remove manus-runtime script block (multi-line)
          content = re.sub(r'<script id=\"manus-runtime\">.*?</script>', '', content, flags=re.DOTALL)
          # Remove __manus__ script tags
          content = re.sub(r'<script[^>]*__manus__[^>]*></script>', '', content)
          # Remove VITE_ANALYTICS_ENDPOINT script tags
          content = re.sub(r'<script[^>]*%VITE_ANALYTICS_ENDPOINT%[^>]*></script>', '', content)
          with open('dist/public/index.html', 'w') as f:
              f.write(content)
          print('Manus scripts removed')
          "
          cp dist/public/index.html dist/public/404.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/public
          force_orphan: true
