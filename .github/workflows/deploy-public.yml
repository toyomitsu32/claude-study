name: Deploy Public to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build for public
        run: pnpm build
        env:
          GITHUB_PAGES: 'true'

      - name: Remove Manus debug scripts and create 404.html
        run: |
          python3 -c "
          import re
          with open('dist/public/index.html', 'r') as f:
              content = f.read()
          content = re.sub(r'<script id=\"manus-runtime\">.*?</script>', '', content, flags=re.DOTALL)
          content = re.sub(r'<script[^>]*__manus__[^>]*></script>', '', content)
          content = re.sub(r'<script[^>]*%VITE_ANALYTICS_ENDPOINT%[^>]*></script>', '', content)
          with open('dist/public/index.html', 'w') as f:
              f.write(content)
          print('Manus scripts removed')
          "
          cp dist/public/index.html dist/public/404.html

      - name: Strip libecity-only content for public version
        run: python3 scripts/strip-libecity.py dist/public/index-content.html

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/public --project-name=claude-handson
